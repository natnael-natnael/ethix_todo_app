<!doctype html>
<html>
  <head>
    <title>Todo Detail</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 24px; }
      .card { max-width: 560px; margin: 40px auto; padding: 24px; background: #bae6fd; border-radius: 20px; }
      .title { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 16px; }
      .desc { font-size: 1.1rem; margin-bottom: 18px; color: #0f172a; }
      .meta { color: #475569; margin-bottom: 12px; }
      .info { font-size: 0.9rem; color: #334155; }
      .user { font-size: 0.8rem; color: #475569; margin-top: 16px; }
      .actions { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
      .btn { padding: 10px 18px; border: none; border-radius: 12px; color: white; text-decoration: none; font-weight: 700; }
      .btn-edit { background: #2563eb; }
      .btn-del { background: #dc2626; }
      .footer { text-align: center; margin-top: 24px; color: #94a3b8; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="title">{{todo.title}}</h1>
      <p class="desc">{{todo.description}}</p>
      <div class="meta">
        <p class="info">Created at: {{todo.created_at}}</p>
        <p class="info">Priority: {{todo.get_priority_display}}</p>
        <p class="info">Completed: {% if todo.is_completed %}Yes{% else %}No{% endif %}</p>
      </div>
      <h3 class="user">Author: {{todo.user.username}}</h3>
      <div class="actions">
        <a href="{% url 'core:update_todo' todo.id %}" class="btn btn-edit">Update</a>
        <a href="{% url 'core:delete_todo' todo.id %}" class="btn btn-del">Delete</a>
      </div>
    </div>
    <footer class="footer">
      <p>© 2024 Todo App</p>
    </footer>
  </body>
</html>
