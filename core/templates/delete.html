<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Todo</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 24px; }
      .page { max-width: 560px; margin: 0 auto; }
      .hd { font-size: 2.5rem; text-align: center; color: #dc2626; margin-bottom: 24px; }
      .card { background: #f1f5f9; border-radius: 18px; padding: 24px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
      .text { font-size: 1.05rem; margin-bottom: 18px; color: #334155; }
      .row { margin-bottom: 16px; }
      .btn { padding: 12px 18px; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; }
      .btn-del { background: #dc2626; }
      .link { margin-left: 14px; color: #2563eb; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body class="page">
    <h1 class="hd">Delete Todo</h1>
    <div class="card">
      <p class="text">Are you sure you want to delete this todo?</p>
      <div class="row"><strong>Title:</strong> {{ todo.title }}</div>
      <div class="row"><strong>Description:</strong> {{ todo.description }}</div>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-del">Yes, Delete</button>
        <a href="{% url 'core:get_todo_by_id' todo.id %}" class="link">Cancel</a>
      </form>
    </div>
  </body>
</html>
