<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Todo List</title>
</head>

<body class="bg-gray-100">

  <div class="flex items-center justify-center min-h-screen">

    <!-- Card -->
    <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md">

      <!-- Header -->
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-sky-500">
          Todo List
        </h1>

        <!-- ✅ Create Button -->
        <a href="{% url 'core:create_todo' %}" 
           class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition text-sm">
          + Create
        </a>
      </div>

      <!-- Add Todo Form (optional inline form) -->
      <form class="flex gap-2 mb-6">
        <input 
          type="text" 
          placeholder="Add a new task..." 
          class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400"
        />
        <button 
          class="bg-sky-500 text-white px-4 py-2 rounded-lg hover:bg-sky-600 transition">
          Add
        </button>
      </form>

      <!-- Todo Items -->
      <ul class="space-y-3">

        <li class="flex items-center justify-between bg-gray-50 p-3 rounded-lg">
          <div class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4" />
            <span class="text-gray-700">Learn Django</span>
          </div>
          <button class="text-red-500 hover:text-red-700 text-sm">
            Delete
          </button>
        </li>

        <li class="flex items-center justify-between bg-gray-50 p-3 rounded-lg">
          <div class="flex items-center gap-2">
            <input type="checkbox" class="w-4 h-4" />
            <span class="line-through text-gray-400">Build Todo App</span>
          </div>
          <button class="text-red-500 hover:text-red-700 text-sm">
            Delete
          </button>
        </li>

      </ul>

    </div>
  </div>

</body>
</html>
