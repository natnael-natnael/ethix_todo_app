<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ethix</title>
  </head>
  <body>
    <h1 class="text-5xl font-bold text-center text-sky-500 underline mt-12">
      my todo app
    </h1>
    {% comment %} todos {% endcomment %}
    <div class="w-1/3 mt-20 mx-auto">
      {% for t in todo_lists %}
      <a
        href="/todos/{{t.id}}"
        class="flex gap-2 items-center mt-4 bg-gray-100 py-3 px-4 bg-sky-100 rounded-lg"
      >
        <input class="h-5 w-5" type="checkbox" />
        {% comment %} title {% endcomment %}
        <p class="text-2xl font-medium">{{t.title}}-{{t.id}}</p>
      </a>
      {% endfor %}
    </div>
  </body>
</html>
