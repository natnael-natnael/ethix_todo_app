<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ethix</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f8fafc; margin: 0; padding: 24px; }
      .page { max-width: 560px; margin: 0 auto; }
      .hd { font-size: 2.5rem; color: #0f4bff; text-align: center; margin-bottom: 24px; }
      .form { display: flex; gap: 12px; justify-content: center; margin-bottom: 40px; }
      .fld { flex: 1; padding: 12px 14px; font-size: 1rem; border: 2px solid #7dd3fc; border-radius: 12px; }
      .btn { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
      .btn-add { background: #f97316; color: #fff; }
      .todo-list { display: flex; flex-direction: column; gap: 16px; }
      .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-radius: 16px; background: #dbeafe; }
      .todo-link { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #0f172a; flex: 1; }
      .todo-text { font-size: 1.25rem; font-weight: 700; }
      .actions { display: flex; gap: 8px; }
      .btn-edit { background: #2563eb; color: #fff; }
      .btn-del { background: #dc2626; color: #fff; }
    </style>
  </head>
  <body class="page">
    <h1 class="hd">my todo app</h1>
    <form method="post" action="{% url 'core:create_todo' %}" class="form">
      {% csrf_token %}
      <input
        name="title"
        class="fld"
        type="text"
        placeholder="add new todo"
        required
      />
      <button type="submit" class="btn btn-add">
        Add
      </button>
    </form>
    <div class="todo-list">
      {% for t in todo_lists %}
      <div class="todo-item">
        <a href="{% url 'core:get_todo_by_id' t.id %}" class="todo-link">
          <input type="checkbox" />
          <p class="todo-text">{{t.title}}-{{t.id}}</p>
        </a>
        <div class="actions">
          <a href="{% url 'core:update_todo' t.id %}" class="btn btn-edit">Update</a>
          <a href="{% url 'core:delete_todo' t.id %}" class="btn btn-del">Delete</a>
        </div>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
